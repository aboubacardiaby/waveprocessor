name: Deploy to GCP Cloud Run

on:
  push:
    branches:
      - main

env:
  REGION: us-central1
  REPOSITORY: waveprocessor
  SERVICE: waveprocessor

jobs:
  build-and-deploy:
    name: Build, push, deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/525776555218/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: kalipeh-svc-sa@kalipeh.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          IMAGE_URI="${{ env.REGION }}-docker.pkg.dev/${PROJECT_ID}/${{ env.REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }}"

          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"

          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          DB_CONN: ${{ secrets.DB_CONNECTION_STRING }}
          WAVE_URL: ${{ secrets.WAVE_BASE_URL }}
          WAVE_PHONE: ${{ secrets.WAVE_PHONE_NUMBER }}
          WAVE_PIN: ${{ secrets.WAVE_PIN }}
          WAVE_KEY: ${{ secrets.WAVE_API_KEY }}
        run: |
          gcloud run deploy "${{ env.SERVICE }}" \
            --image "$IMAGE_URI" \
            --region "${{ env.REGION }}" \
            --project "$PROJECT_ID" \
            --platform managed \
            --port 8080 \
            --allow-unauthenticated \
            --set-env-vars "^|^ConnectionStrings__DefaultConnection=$DB_CONN|Wave__BaseUrl=$WAVE_URL|Wave__PhoneNumber=$WAVE_PHONE|Wave__Pin=$WAVE_PIN|Wave__ApiKey=$WAVE_KEY"

      - name: Print service URL
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          gcloud run services describe "${{ env.SERVICE }}" \
            --region "${{ env.REGION }}" \
            --project "$PROJECT_ID" \
            --format "value(status.url)"